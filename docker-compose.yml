version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: orderstream-postgres
    environment:
      POSTGRES_DB: orderstream
      POSTGRES_USER: orderstream
      POSTGRES_PASSWORD: orderstream
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

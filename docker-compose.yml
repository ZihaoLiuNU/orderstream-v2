version: '3.8'

services:
  # 数据库服务
  postgres:
    image: postgres:15
    container_name: orderstream-postgres
    environment:
      POSTGRES_DB: orderstream
      POSTGRES_USER: orderstream
      POSTGRES_PASSWORD: orderstream
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderstream"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka 依赖的 ZooKeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: orderstream-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # 消息队列服务
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: orderstream-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Spring Boot 应用（本地开发用 profile 启动）
  app:
    build: .
    container_name: orderstream-app
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # 容器内访问其他服务使用 service name，而非 localhost
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orderstream
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

volumes:
  postgres_data:

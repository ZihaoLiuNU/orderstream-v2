spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/orderstream
    username: orderstream
    password: orderstream
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: orderstream-secret-key-change-this-in-production-must-be-at-least-256-bits
  expiration: 86400000

server:
  port: 8080

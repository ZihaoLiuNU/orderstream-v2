spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/orderstream
    username: orderstream
    password: orderstream
    driver-class-name: org.postgresql.Driver
    hikari:
      # 连接池最大连接数：根据 CPU 核心数 * 2 + 有效磁盘数 估算
      maximum-pool-size: 10
      # 最小空闲连接数：低流量时段保持少量连接减少冷启动延迟
      minimum-idle: 2
      # 获取连接超时时间（ms）：超过此时间抛出异常而不是无限等待
      connection-timeout: 30000
      # 空闲连接存活时间（ms）：10分钟，超时后从池中移除
      idle-timeout: 600000
      # 连接最大生命周期（ms）：30分钟，强制刷新连接避免数据库端主动断开
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: orderstream-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        # 信任所有 orderstream 包下的事件类，允许反序列化
        spring.json.trusted.packages: "com.orderstream.*"

jwt:
  secret: orderstream-secret-key-change-this-in-production-must-be-at-least-256-bits
  expiration: 86400000

server:
  port: 8080
